<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Trip</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body id="newTrip-body">
    <div class="container">

        <!-- Nav Bar -->
        <div class="nav-container">
            <div class="nav-home-container">
                <!-- Home button with house icon -->
                <a href="{{ url_for('index') }}">
                    <button class="btn btn-home">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4H9v4a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V9z"/>
                        </svg>
                    </button>
                </a>
            </div>

            <div class="nav-logout">
                <a href="{{ url_for('logout') }}">
                    <button class="btn btn-danger">Logout</button>
                </a>
            </div>
        </div>

        <h1>Create New Trip</h1>

        <!-- New Trip Form -->
        <form method="POST" class="form-box" novalidate>
            <label>Trip Name</label>
            <input type="text" name="trip_name" class="input-field"
                value="{{ entered_trip_name|default('') }}">

            <div class="form-row">
                <label>Country:</label>
                <select name="country_id">
                    {% for country in countries %}
                        <option value="{{ country.id }}" {% if selected_country == country.id %}selected{% endif %}>
                           {{ country.flag }} {{ country.country_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
                
            <div class="form-row">
                <label for="start_date">Start Date:</label>
                <input type="date" name="start_date" class="input-field date-input-field"
                        value="{{ entered_start_date|default('') }}">
            </div>

            <div class="form-row">
                <label>End Date:</label>
                <input type="date" name="end_date" class="input-field date-input-field"
                    value="{{ entered_start_date|default('') }}">
            </div>

            <button type="submit" class="btn btn-submit">Add New Trip</button>
        </form>
    </div>

    <!-- Flexible Modal for Delete / Errors -->
    <div id="flexModal" class="modal">
        <div class="modal-content">
            <p id="modal-text"></p>
            <form id="modalForm" method="POST" style="display:none;">
                <button type="submit" class="btn btn-cancel" id="modalConfirmBtn">Yes, Delete</button>
                <button type="button" class="btn btn-submit" onclick="closeModal()">Cancel</button>
            </form>
            <button type="button" class="btn" id="modalOkBtn" style="display:none;" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/modal.js') }}"></script>

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    openModal({
                        type: '{{ category }}',
                        text: "{{ message|escape }}"
                    });
                {% endfor %}
            {% endif %}
        {% endwith %}
    });
    </script>
</body>

</html>
